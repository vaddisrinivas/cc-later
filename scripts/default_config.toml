[paths]
# Empty means: auto-watch the current repo where the hook runs.
watch = []

[later]
path = ".claude/LATER.md"
max_entries_per_dispatch = 3
auto_gitignore = true

[dispatch]
# Enabled by default so plugin works immediately after install.
enabled = true
model = "sonnet"
allow_file_writes = false
output_path = "~/.cc-later/results/{repo}-{date}.json"

[window]
# window_aware: use Claude JSONL usage window
# time_based: only dispatch inside fallback_dispatch_hours
# always: dispatch whenever idle

dispatch_mode = "window_aware"
trigger_at_minutes_remaining = 30
idle_grace_period_minutes = 10
fallback_dispatch_hours = []
jsonl_paths = []

[limits]
weekly_budget_tokens = 10_000_000
backoff_at_pct = 80

[auto_resume]
# Resume tasks that failed due to rate/usage limits in the next fresh window.
enabled = true
min_remaining_minutes = 240
