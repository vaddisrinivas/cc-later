[window]
trigger_at_minutes_remaining = 30
idle_grace_period_minutes = 10
respect_peak_hours = true
peak_windows = []
dispatch_mode = "window_aware"
fallback_dispatch_hours = []
jsonl_paths = []

# Time-aware trigger schedules: different trigger thresholds by time-of-day.
# Each entry has "hours" (HH:MM-HH:MM, supports overnight) and "remaining_pct"
# (dispatch when this % of the 5hr window remains). Checked in order, first match wins.
# Falls back to trigger_at_minutes_remaining when no schedule matches.
trigger_schedules_enabled = false
# Example: aggressive at night (trigger at 10% left), conservative otherwise (30% left)
# trigger_schedules = [
#   {hours = "01:00-05:00", remaining_pct = 10},
#   {hours = "05:00-01:00", remaining_pct = 30},
# ]
trigger_schedules = []

[paths]
watch = []
exclude_patterns = ["node_modules", ".git", "__pycache__", "dist", "build", ".venv", "vendor"]
max_files_per_scan = 200

[later_md]
path = ".claude/LATER.md"
auto_gitignore = true
max_entries_per_dispatch = 3
mark_completed = "check"
priority_marker = "[!]"

[dispatch]
enabled = false
model = "sonnet"
# "fixed" = always use dispatch.model; "auto" = route by task complexity
model_routing = "fixed"
allow_file_writes = false
max_files_written_per_task = 5
prompt_template = ""
output_path = "~/.cc-later/results/{repo}-{date}.json"

[skill]
suggest_threshold = "balanced"
auto_append = true
end_of_session_note = false

[notifications]
desktop = false
on_dispatch = true
on_complete = true
on_error = true
# POST JSON payloads to this URL on events (Slack/Discord incoming webhook, etc.)
webhook_url = ""
webhook_events = ["dispatch", "complete", "error"]

[budget]
plan = "pro"
weekly_token_budget = 10_000_000
backoff_at_pct = 80
probe_model = "claude-haiku-4-5-20251001"

[retry]
# Automatically retry failed tasks with exponential backoff
enabled = true
max_attempts = 3
# Minutes to wait before retry: 1st retry after 30m, 2nd after 2h, 3rd after 8h
backoff_minutes = [30, 120, 480]
# After max_attempts, mark as [?] (needs human) instead of retrying forever
escalate_to_priority = true

[auto_resume]
# Automatically resume tasks that failed because Claude hit usage/rate limits.
enabled = false
# In window_aware mode, only resume when a fresh window has at least this much time left.
min_remaining_minutes = 240

[verify]
# Verify dispatch results before marking as DONE
enabled = true
# Require actual git diff when allow_file_writes is on
require_diff = false
# Minimum confidence to accept: "low", "medium", "high"
min_confidence = "low"
